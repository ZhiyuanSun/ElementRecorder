<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Element Recorder</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Element Recorder</h1>
          <p>Capture the screen or isolate a page element.</p>
        </div>
      </header>

      <section class="actions" aria-label="Recording modes">
        <button class="mode-button primary" id="record-screen" type="button">
          <span class="mode-icon" aria-hidden="true">●</span>
          <span>
            <strong>Record Screen</strong>
            <small>Capture a tab, window, or display</small>
          </span>
        </button>

        <button class="mode-button" id="record-element" type="button">
          <span class="mode-icon focus" aria-hidden="true"></span>
          <span>
            <strong>Record Element</strong>
            <small>Select an area visually</small>
          </span>
        </button>
      </section>

      <section class="format-section" aria-label="Export format">
        <span>Format</span>
        <div class="format-options" role="radiogroup" aria-label="Export format">
          <label>
            <input type="radio" name="format" value="webm" checked />
            <span>WebM</span>
          </label>
          <label>
            <input type="radio" name="format" value="mp4" />
            <span>MP4</span>
          </label>
          <label>
            <input type="radio" name="format" value="gif" />
            <span>GIF</span>
          </label>
        </div>
      </section>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
