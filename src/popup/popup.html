<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Element Recorder</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Element Recorder</h1>
          <p>Capture the screen or isolate a page element.</p>
        </div>
      </header>

      <section class="actions" aria-label="Capture actions">
        <div class="action-group">
          <div class="action-kind">
            <span class="mode-icon" aria-hidden="true">●</span>
            <span>
              <strong>Record</strong>
              <small>Video capture</small>
            </span>
          </div>
          <div class="action-choices" aria-label="Recording modes">
            <button class="choice-button primary" id="record-screen" type="button">
              <strong>Screen</strong>
              <small>Visible tab</small>
            </button>
            <button class="choice-button" id="record-element" type="button">
              <strong>Element</strong>
              <small>Select area</small>
            </button>
          </div>
        </div>

        <div class="action-group">
          <div class="action-kind">
            <span class="mode-icon camera" aria-hidden="true"></span>
            <span>
              <strong>Screenshot</strong>
              <small>Image capture</small>
            </span>
          </div>
          <div class="action-choices" aria-label="Screenshot modes">
            <button class="choice-button" id="screenshot-screen" type="button">
              <strong>Screen</strong>
              <small>Visible tab</small>
            </button>
            <button class="choice-button" id="screenshot-element" type="button">
              <strong>Element</strong>
              <small>Select area</small>
            </button>
          </div>
        </div>
      </section>

      <section class="format-section" aria-label="Video format">
        <span>Video</span>
        <div class="format-options" role="radiogroup" aria-label="Video format">
          <label>
            <input type="radio" name="recording-format" value="webm" checked />
            <span>WebM</span>
          </label>
          <label>
            <input type="radio" name="recording-format" value="mp4" />
            <span>MP4</span>
          </label>
          <label>
            <input type="radio" name="recording-format" value="gif" />
            <span>GIF</span>
          </label>
        </div>
      </section>

      <section class="format-section" aria-label="Screenshot format">
        <span>Image</span>
        <div class="format-options" role="radiogroup" aria-label="Screenshot format">
          <label>
            <input type="radio" name="screenshot-format" value="png" checked />
            <span>PNG</span>
          </label>
          <label>
            <input type="radio" name="screenshot-format" value="jpeg" />
            <span>JPG</span>
          </label>
          <label>
            <input type="radio" name="screenshot-format" value="webp" />
            <span>WebP</span>
          </label>
        </div>
      </section>

      <section class="option-section" aria-label="Recording options">
        <label class="toggle-row">
          <input type="checkbox" id="hide-mouse" checked />
          <span class="toggle-ui" aria-hidden="true"></span>
          <span>
            <strong>Hide Mouse</strong>
            <small>Hide the cursor while recording elements</small>
          </span>
        </label>
      </section>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
